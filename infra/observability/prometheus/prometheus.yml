# Prometheus scrape configuration for local / Docker Compose observability stack.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: drone-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: drone-api
          environment: local

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
