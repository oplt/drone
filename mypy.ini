[mypy]
python_version = 3.11
warn_unused_ignores = True
warn_redundant_casts = True
warn_unused_configs = True
check_untyped_defs = False
disallow_untyped_defs = False
no_implicit_optional = True

# Third-party libraries used by this project that often ship without stubs.
# Keep these targeted (instead of global ignore_missing_imports) so mypy still
# catches real issues in our own code.
[mypy-flask_login.*]
ignore_missing_imports = True

[mypy-flask_socketio.*]
ignore_missing_imports = True

[mypy-flask_bcrypt.*]
ignore_missing_imports = True

[mypy-flask_wtf.*]
ignore_missing_imports = True

[mypy-wtforms.*]
ignore_missing_imports = True

[mypy-pymavlink.*]
ignore_missing_imports = True

[mypy-picamera2.*]
ignore_missing_imports = True

