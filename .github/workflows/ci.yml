name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend:
    runs-on: ubuntu-latest
    needs: secrets
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: drone
          POSTGRES_USER: drone
          POSTGRES_PASSWORD: drone
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U drone -d drone"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://drone:drone@localhost:5432/drone
      SETTINGS_VAULT_KEY: BHmFE5e3ErYeWjVExeoWQooA3kDUO0Uh0bZOhZGH12c=
      JWT_SECRET: ci-jwt-secret
      GOOGLE_MAPS_API_KEY: ci-placeholder
      DRONE_CONN: udp:127.0.0.1:14550
      DRONE_CONN_MAVPROXY: udp:127.0.0.1:14551
      HEARTBEAT_TIMEOUT: "5.0"
      RASPBERRY_IP: 127.0.0.1
      RASPBERRY_USER: ci
      RASPBERRY_HOST: raspberrypi.local
      RASPBERRY_PASSWORD: ci-placeholder
      SSH_KEY_PATH: /tmp/id_rsa
      DB_AUTO_CREATE: "0"
      ALERTS_ENABLED: "0"
      WEBODM_MOCK_MODE: "1"
      PHOTOGRAMMETRY_ASSET_SIGNING_SECRET: ci-asset-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run migrations
        run: alembic -c backend/alembic.ini upgrade head
      - name: Lint (ruff)
        run: ruff check .
      - name: Type check (mypy)
        run: mypy backend/ --ignore-missing-imports
      - name: Tests with coverage
        run: pytest backend/tests/ --cov=backend --cov-report=xml -v || echo "No tests yet"

  frontend:
    runs-on: ubuntu-latest
    needs: secrets
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend
        env:
          VITE_API_BASE_URL: http://localhost:8000
          VITE_GOOGLE_MAPS_JAVASCRIPT_API_KEY: ci-placeholder
          VITE_GOOGLE_MAPS_MAP_ID: ci-placeholder
          VITE_CESIUM_ION_TOKEN: ci-placeholder
        run: npm run build
