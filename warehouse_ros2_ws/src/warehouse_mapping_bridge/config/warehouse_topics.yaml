# Warehouse ROS topic registry. Env vars (WAREHOUSE_*_TOPIC) override these values.
# Select profile via WAREHOUSE_TOPIC_PROFILE (defaults to gazebo when WAREHOUSE_GAZEBO_SIM=1).
#
# Naming layers (intentional, not a single flat prefix):
#   /warehouse/contract/*  — stable API for health, preflight, and flight gates (use in docs/scripts)
#   /warehouse/front/*     — Gazebo RGB-D rig (sensors on the airframe nose)
#   /warehouse/drone/*     — vehicle state (odometry from the drone model)
#   /warehouse/stereo/*    — optional stereo pair when the world provides it
# topic_adapter relays source_profiles -> contract at runtime.

contract:
  rgb_image: /warehouse/contract/rgb/image
  left_image: /warehouse/contract/stereo/left/image
  right_image: /warehouse/contract/stereo/right/image
  depth: /warehouse/contract/depth/image
  imu: /warehouse/contract/imu
  visual_slam_odom: /warehouse/contract/odometry
  local_odometry: /warehouse/contract/local_odometry
  raw_lidar: /warehouse/contract/points
  pointcloud: /warehouse/contract/map/points
  mesh: /warehouse/contract/map/mesh
  mesh_marker: /warehouse/contract/map/mesh_marker
  occupancy: /warehouse/contract/map/occupancy
  esdf: /warehouse/contract/map/esdf
  static_map_slice: /warehouse/contract/map/static_slice
  combined_map_slice: /warehouse/contract/map/combined_slice
  back_projected_depth: /warehouse/contract/depth/back_projected
  health: /warehouse/mapping/health

source_profiles:
  gazebo:
    rgb_image: /warehouse/front/rgbd/image
    left_image: /warehouse/stereo/left/image
    right_image: /warehouse/stereo/right/image
    depth: /warehouse/front/rgbd/depth_image
    # start_gazebo_sensor_bridge relays discovered Gazebo IMU into /imu.
    imu: /imu
    visual_slam_odom: /warehouse/drone/odometry
    local_odometry: /warehouse/drone/odometry
    # 3D LiDAR (Gazebo Mid-360); topic_adapter relays into /warehouse/contract/points
    raw_lidar: /warehouse/mid360/scan/points
    pointcloud: /nvblox_node/static_esdf_pointcloud
    mesh: /nvblox_node/mesh
    mesh_marker: /nvblox_node/tsdf_layer_marker
    occupancy: /nvblox_node/occupancy_layer
    esdf: /nvblox_node/static_esdf_pointcloud
    static_map_slice: /nvblox_node/static_map_slice
    combined_map_slice: /nvblox_node/combined_map_slice

  isaac_ros_nvblox_stereo:
    rgb_image: /warehouse/front/rgbd/image
    left_image: /left/image_rect
    right_image: /right/image_rect
    depth: /depth
    imu: /imu
    visual_slam_odom: /visual_slam/tracking/odometry
    local_odometry: /warehouse/local_odometry
    raw_lidar: /lidar/points
    pointcloud: /nvblox_node/static_esdf_pointcloud
    mesh: /nvblox_node/mesh
    mesh_marker: /nvblox_node/mesh_marker
    occupancy: /nvblox_node/occupancy_layer
    esdf: /nvblox_node/static_esdf_pointcloud
    static_map_slice: /nvblox_node/static_map_slice
    combined_map_slice: /nvblox_node/combined_map_slice
    back_projected_depth: /nvblox_node/back_projected_depth

  real_device:
    rgb_image: /camera/color/image_raw
    left_image: /stereo/left/image_rect
    right_image: /stereo/right/image_rect
    depth: /camera/depth/image_rect_raw
    imu: /imu/data
    visual_slam_odom: /visual_slam/tracking/odometry
    local_odometry: /warehouse/local_odometry
    raw_lidar: /lidar/points
    pointcloud: /nvblox_node/static_esdf_pointcloud
    mesh: /nvblox_node/mesh
    mesh_marker: /nvblox_node/mesh_marker
    occupancy: /nvblox_node/occupancy_layer
    esdf: /nvblox_node/static_esdf_pointcloud
    static_map_slice: /nvblox_node/static_map_slice
    combined_map_slice: /nvblox_node/combined_map_slice
    back_projected_depth: /nvblox_node/back_projected_depth

aliases:
  rgb_image:
    - /warehouse/front/rgbd/image
  depth:
    - /warehouse/front/rgbd/depth_image
  raw_lidar:
    - /warehouse/mid360/scan/points
    - /warehouse/mid360/scan
    - /scan/points
    - /scan
    - /warehouse/front/rgbd/points
    - /lidar/points
  imu:
    - /imu
    - /imu/data
    - /warehouse/drone/imu
    - /world/iris_warehouse/model/iris_rplidar_rgbd/model/iris_with_standoffs/link/imu_link/sensor/imu_sensor/imu
  visual_slam_odom:
    - /warehouse/drone/odometry
    - /visual_slam/tracking/odometry
  local_odometry:
    - /warehouse/local_odometry
    - /warehouse/drone/odometry
  occupancy:
    - /nvblox_node/static_occupancy_grid
    - /nvblox_node/combined_occupancy_grid
  esdf:
    - /nvblox_node/static_esdf_pointcloud
    - /nvblox_node/pessimistic_static_esdf_pointcloud
  mesh_marker:
    - /nvblox_node/tsdf_layer_marker
    - /nvblox_node/color_layer_marker
  pointcloud:
    - /nvblox_node/pointcloud
    - /nvblox_node/static_esdf_pointcloud
    - /nvblox_node/static_map_slice
  static_map_slice:
    - /nvblox_node/static_map_slice
  combined_map_slice:
    - /nvblox_node/combined_map_slice

required_for_perception:
  - rgb_image
  - depth
  - imu
  - visual_slam_odom
  - raw_lidar

required_for_nvblox_any:
  - pointcloud
  - mesh
  - mesh_marker
  - occupancy
  - esdf
  - static_map_slice
  - combined_map_slice

gazebo_frames:
  odom: odom
  base_link: iris_with_standoffs/base_link
  camera: iris_rplidar_rgbd/front_rgbd_camera_link/front_rgbd_camera

frames:
  odom: odom
  base_link: base_link
  camera: front_rgbd_camera_link

frame_aliases:
  base_link:
    - iris_with_standoffs/base_link
    - base_link
  camera:
    - iris_rplidar_rgbd/front_rgbd_camera_link/front_rgbd_camera
    - front_rgbd_camera_link
