services:
  api:
    environment:
      WAREHOUSE_ROS_BRIDGE_URL: ${WAREHOUSE_ROS_BRIDGE_URL:-http://jetson.local:8088}
      WAREHOUSE_ROS_WS_URL: ${WAREHOUSE_ROS_WS_URL:-ws://jetson.local:8089/ws}
      WAREHOUSE_ROS_PROFILE: ${WAREHOUSE_ROS_PROFILE:-isaac_ros_nvblox_stereo}
      WAREHOUSE_ROS_BRIDGE_TIMEOUT_S: ${WAREHOUSE_ROS_BRIDGE_TIMEOUT_S:-3.0}

  worker-warehouse-mapping:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    command: celery -A backend.entrypoints.workers.celery_app.celery_app worker -Q warehouse-mapping -l INFO
    environment:
      WAREHOUSE_ROS_BRIDGE_URL: ${WAREHOUSE_ROS_BRIDGE_URL:-http://jetson.local:8088}
      CELERY_WAREHOUSE_MAPPING_QUEUE: ${CELERY_WAREHOUSE_MAPPING_QUEUE:-warehouse-mapping}
    depends_on:
      - redis
      - db

