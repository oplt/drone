services:
  warehouse-ros-bridge:
    image: warehouse-ros-bridge:latest
    network_mode: host
    privileged: true
    environment:
      WAREHOUSE_ROS_BRIDGE_HOST: 0.0.0.0
      WAREHOUSE_ROS_BRIDGE_PORT: 8088
      WAREHOUSE_ROS_CAPTURE_ROOT: /backend/storage/warehouse_ros
      WAREHOUSE_ROS_PROFILE: isaac_ros_nvblox_stereo
      WAREHOUSE_ROS_AUTOLAUNCH: "1"
      WAREHOUSE_ROS_LAUNCH_CMD: ros2 launch warehouse_mapping_bridge isaac_warehouse_mapping.launch.py
    volumes:
      - /data/warehouse_ros:/data/warehouse_ros
      - /dev:/dev
    restart: unless-stopped

