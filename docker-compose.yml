services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: drone
      POSTGRES_USER: drone
      POSTGRES_PASSWORD: drone
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drone -d drone"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://drone:drone@postgres:5432/drone
      SETTINGS_VAULT_KEY: BHmFE5e3ErYeWjVExeoWQooA3kDUO0Uh0bZOhZGH12c=
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-CHANGE-ME}
      ADMIN_EMAILS: admin@example.com
      GOOGLE_MAPS_API_KEY: dev-placeholder
      DRONE_CONN: udp:127.0.0.1:14550
      DRONE_CONN_MAVPROXY: udp:127.0.0.1:14551
      HEARTBEAT_TIMEOUT: "5.0"
      RASPBERRY_IP: 127.0.0.1
      RASPBERRY_USER: operator
      RASPBERRY_HOST: raspberrypi.local
      RASPBERRY_PASSWORD: dev-placeholder
      SSH_KEY_PATH: /tmp/id_rsa
      DEBUG_ROUTES_ENABLED: "0"
      DB_AUTO_CREATE: "0"
      ALERTS_ENABLED: "0"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      MAPPING_JOB_QUEUE_BACKEND: celery
      WEBODM_MOCK_MODE: "1"
      PHOTOGRAMMETRY_ASSET_SIGNING_SECRET: ${PHOTOGRAMMETRY_ASSET_SIGNING_SECRET:-}
      COOKIE_SECURE: "0"
      COOKIE_SAMESITE: lax
      REDIS_URL: "redis://redis:6379/0"
      STORAGE_BACKEND: "s3"
      S3_ENDPOINT_URL: "http://minio:9000"
      S3_ACCESS_KEY: "${MINIO_ROOT_USER:-minioadmin}"
      S3_SECRET_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      S3_BUCKET_NAME: "drone-assets"
      S3_REGION: "us-east-1"
    command: >
      sh -c "alembic -c backend/alembic.ini upgrade head &&
      uvicorn backend.api.api_main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - mapping_storage:/app/backend/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://drone:drone@postgres:5432/drone
      SETTINGS_VAULT_KEY: BHmFE5e3ErYeWjVExeoWQooA3kDUO0Uh0bZOhZGH12c=
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-CHANGE-ME}
      GOOGLE_MAPS_API_KEY: dev-placeholder
      DRONE_CONN: udp:127.0.0.1:14550
      DRONE_CONN_MAVPROXY: udp:127.0.0.1:14551
      HEARTBEAT_TIMEOUT: "5.0"
      RASPBERRY_IP: 127.0.0.1
      RASPBERRY_USER: operator
      RASPBERRY_HOST: raspberrypi.local
      RASPBERRY_PASSWORD: dev-placeholder
      SSH_KEY_PATH: /tmp/id_rsa
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CELERY_PHOTOGRAMMETRY_QUEUE: photogrammetry
      MAPPING_JOB_QUEUE_BACKEND: celery
      WEBODM_MOCK_MODE: "1"
      PHOTOGRAMMETRY_ASSET_SIGNING_SECRET: ${PHOTOGRAMMETRY_ASSET_SIGNING_SECRET:-}
      COOKIE_SECURE: "0"
      COOKIE_SAMESITE: lax
      REDIS_URL: "redis://redis:6379/0"
      STORAGE_BACKEND: "s3"
      S3_ENDPOINT_URL: "http://minio:9000"
      S3_ACCESS_KEY: "${MINIO_ROOT_USER:-minioadmin}"
      S3_SECRET_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      S3_BUCKET_NAME: "drone-assets"
      S3_REGION: "us-east-1"
    command: >
      celery -A backend.tasks.celery_app:celery_app worker
      --loglevel=INFO
      --queues=photogrammetry,exports,webhooks
      --hostname=worker@%h
    volumes:
      - mapping_storage:/app/backend/storage

  beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://drone:drone@postgres:5432/drone
      SETTINGS_VAULT_KEY: BHmFE5e3ErYeWjVExeoWQooA3kDUO0Uh0bZOhZGH12c=
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-CHANGE-ME}
      GOOGLE_MAPS_API_KEY: dev-placeholder
      DRONE_CONN: udp:127.0.0.1:14550
      DRONE_CONN_MAVPROXY: udp:127.0.0.1:14551
      HEARTBEAT_TIMEOUT: "5.0"
      RASPBERRY_IP: 127.0.0.1
      RASPBERRY_USER: operator
      RASPBERRY_HOST: raspberrypi.local
      RASPBERRY_PASSWORD: dev-placeholder
      SSH_KEY_PATH: /tmp/id_rsa
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      REDIS_URL: "redis://redis:6379/0"
      STORAGE_BACKEND: "s3"
      S3_ENDPOINT_URL: "http://minio:9000"
      S3_ACCESS_KEY: "${MINIO_ROOT_USER:-minioadmin}"
      S3_SECRET_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      S3_BUCKET_NAME: "drone-assets"
      S3_REGION: "us-east-1"
    command: >
      celery -A backend.tasks.celery_app:celery_app beat
      --loglevel=INFO

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
        VITE_GOOGLE_MAPS_JAVASCRIPT_API_KEY: dev-placeholder
        VITE_GOOGLE_MAPS_MAP_ID: dev-placeholder
        VITE_CESIUM_ION_TOKEN: dev-placeholder
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  postgres_data:
  mapping_storage:
  minio_data:
